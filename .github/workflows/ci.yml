name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: researcher
          POSTGRES_PASSWORD: research_pass
          POSTGRES_DB: tw_stock_research
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Schema Migration
        run: npm run db:up
        env:
          STORAGE_TYPE: postgres
          DB_HOST: localhost
          DB_USER: researcher
          DB_PASSWORD: research_pass
          DB_NAME: tw_stock_research

      - name: Run Unit & Integration Tests
        run: npm test
        env:
          STORAGE_TYPE: postgres
          DB_HOST: localhost
          DB_USER: researcher
          DB_PASSWORD: research_pass
          DB_NAME: tw_stock_research
          REDIS_HOST: localhost
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}

      - name: Run E2E Smoke Test
        run: npm run test:e2e
        env:
          STORAGE_TYPE: postgres
          DB_HOST: localhost
          DB_USER: researcher
          DB_PASSWORD: research_pass
          DB_NAME: tw_stock_research
          REDIS_HOST: localhost
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}

      - name: Run 3-Day Batch Test
        run: npm run test:batch 2024-04-01 2024-04-03
        env:
          STORAGE_TYPE: postgres
          DB_HOST: localhost
          DB_USER: researcher
          DB_PASSWORD: research_pass
          DB_NAME: tw_stock_research
          REDIS_HOST: localhost
          FINMIND_API_TOKEN: \${{ secrets.FINMIND_API_TOKEN }}
