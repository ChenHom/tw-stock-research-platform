services:
  db:
    image: postgres:16-alpine
    container_name: tw-stock-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-researcher}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-research_pass}
      POSTGRES_DB: ${DB_NAME:-tw_stock_research}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-researcher} -d ${DB_NAME:-tw_stock_research}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
